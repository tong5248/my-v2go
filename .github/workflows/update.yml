name: Update V2Ray Configs
permissions: write-all
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */12 * * *"  # Every 1 hour
  workflow_dispatch:  # Allow manual trigger
    
jobs:
  update-configs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1  # Shallow clone: only latest commit needed for build + aggregator

    - name: Configure Git and sync with latest main
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        # Rebase onto latest main (handles concurrent schedule/push runs)
        git pull --rebase origin main
      
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'
        cache: true
        
    - name: Build and run Go aggregator
      run: |
        echo "Building Go application..."
        go mod tidy
        # Build both files together since main.go depends on sort.go
        go build -ldflags="-s -w" -o aggregator *.go
        echo "Starting config aggregation and sorting..."
        ulimit -n 65535
        ./aggregator
        echo "Config processing completed successfully!"
        
    - name: Filter and Limit Nodes (High Quality)
      run: |
        echo "Filtering nodes: Excluding CN, HK, RU, IR and keeping top 500..."
        
        # 1. 如果文件存在，开始清洗
        if [ -f "All_Configs_Sub.txt" ]; then
          # 排除包含 中国, 香港, 俄罗斯, 伊朗 关键词的行 (支持中文和常用缩写)
          # grep -vE 表示排除匹配项
          grep -vE "中国|香港|俄罗斯|伊朗|CN|HK|RU|IR|Russia|Iran" All_Configs_Sub.txt > filtered.tmp
          
          # 2. 只保留前 500 行 (通常排序靠前的节点是脚本最早处理的)
          head -n 500 filtered.tmp > All_Configs_Sub.txt
          
          # 3. 清理临时文件
          rm filtered.tmp
          
          echo "Filtering done. Remaining nodes: $(wc -l < All_Configs_Sub.txt)"
        else
          echo "Warning: All_Configs_Sub.txt not found, skipping filter."
        fi  
        
    - name: Verify output files
      run: |
        echo "Verifying generated files..."
        echo "Files in root directory:"
        ls -la *.txt 2>/dev/null || echo "No .txt files found in root"
        
        echo "\nProtocol directory contents:"
        ls -la Splitted-By-Protocol/ 2>/dev/null || echo "No protocol directory found"
        
        echo "\nSub files:"
        ls -la Sub*.txt 2>/dev/null || echo "No Sub files found"
        
        echo "\nBase64 directory:"
        ls -la Base64/ 2>/dev/null || echo "No Base64 directory found"
        
        # Count total configs and show file sizes
        if [ -f "All_Configs_Sub.txt" ]; then
          TOTAL_CONFIGS=$(wc -l < All_Configs_Sub.txt)
          FILE_SIZE=$(du -h All_Configs_Sub.txt | cut -f1)
          echo "\nMain config file: $TOTAL_CONFIGS configurations ($FILE_SIZE)"
        else
          echo "\nMain config file not found - checking if it was split..."
        fi
        
        # Check protocol files
        if [ -d "Splitted-By-Protocol" ]; then
          echo "\nProtocol file statistics:"
          for file in Splitted-By-Protocol/*.txt; do
            if [ -f "$file" ]; then
              count=$(wc -l < "$file")
              size=$(du -h "$file" | cut -f1)
              basename=$(basename "$file")
              echo "  $basename: $count configs ($size)"
            fi
          done
        fi
      
    - name: Handle large files and prepare for commit
      run: |
        echo "Checking file sizes and handling large files..."
        
        # Function to check file size and split if needed
        handle_large_file() {
          local file="$1"
          local prefix="$2"
          
          if [ -f "$file" ]; then
            size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null || echo 0)
            size_mb=$((size / 1024 / 1024))
            echo "File $file size: ${size_mb}MB"
            
            if [ $size_mb -gt 90 ]; then
              echo "Splitting large file: $file"
              split -b 90M "$file" "${prefix}_part_"
              rm "$file"
              echo "File split into parts with prefix: ${prefix}_part_"
            fi
          fi
        }
        
        # Handle potentially large files
        handle_large_file "All_Configs_Sub.txt" "All_Configs_Sub"
        handle_large_file "All_Configs_base64_Sub.txt" "All_Configs_base64_Sub"
        
        # Handle protocol files
        if [ -d "Splitted-By-Protocol" ]; then
          for protocol_file in Splitted-By-Protocol/*.txt; do
            if [ -f "$protocol_file" ]; then
              filename=$(basename "$protocol_file" .txt)
              handle_large_file "$protocol_file" "Splitted-By-Protocol/${filename}"
            fi
          done
        fi
        
    - name: Commit and push changes
      uses: EndBug/add-and-commit@v9
      with:
        author_name: "GitHub Actions"
        author_email: "github-actions[bot]@users.noreply.github.com"
        message: "🚀 Fresh Update"
        add: "."
        default_author: github_actor
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup-old-files:
    runs-on: ubuntu-latest
    needs: update-configs
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete sub files older than 24 hours
        run: |
          echo "🧹 Checking for .txt sub files older than 24 hours..."
          shopt -s nullglob 2>/dev/null || true
          THRESHOLD=$(($(date +%s) - 86400))  # 24 hours ago in seconds
          DELETED=0

          # Find all relevant .txt files (Sub*.txt, Base64/Sub*_base64.txt, Splitted-By-Country/*.txt, Splitted-By-Protocol/*.txt)
          for file in Sub*.txt Base64/Sub*_base64.txt Splitted-By-Country/*.txt Splitted-By-Protocol/*.txt; do
            [ -f "$file" ] || continue
            last_commit=$(git log -1 --format=%ct -- "$file" 2>/dev/null)
            if [ -n "$last_commit" ] && [ "$last_commit" -lt "$THRESHOLD" ]; then
              echo "  Deleting (last modified $(( ($(date +%s) - last_commit) / 3600 ))h ago): $file"
              git rm "$file"
              DELETED=$((DELETED + 1))
            fi
          done

          if [ $DELETED -eq 0 ]; then
            echo "  No stale files found."
          else
            echo "  Removed $DELETED stale file(s)."
          fi

      - name: Commit and push cleanup
        run: |
          if git diff --staged --quiet 2>/dev/null; then
            echo "No cleanup changes to commit."
          else
            git config --global user.name "GitHub Actions"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "🧹 Cleanup: Remove sub files older than 24 hours"
            # Pull latest changes (update-configs may have pushed) then push
            git pull --rebase "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" main
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
