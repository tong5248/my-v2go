                div.className = 'glass p-4 rounded-xl flex justify-between items-center group hover:border-cyan-500/30 transition-all';
                let pColor = 'text-purple-400';
                if(n.l.includes('VMESS')) pColor = 'text-blue-400';
                if(n.l.includes('TROJAN')) pColor = 'text-red-400';

                div.innerHTML = `
                    <div class="truncate mr-4">
                        <div class="text-[10px] font-bold uppercase tracking-widest ${pColor}">${n.l.split('|')[2] || 'V2RAY'}</div>
                        <div class="text-sm font-medium text-white/80 group-hover:text-white truncate">${n.l}</div>
                    </div>
                    <div class="flex items-center space-x-3">
                        <div class="text-right">
                            <div class="text-xs font-bold text-cyan-400">${n.p}ms</div>
                        </div>
                        <button onclick="copyRaw('${n.l}')" class="p-2 hover:text-cyan-400"><i class="lucide-copy w-4 h-4"></i></button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function copyRaw(text) {
            navigator.clipboard.writeText(text);
            alert('Copied!');
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderElite();
            const tabs = document.querySelectorAll('.tab-button');
            const contents = document.querySelectorAll('.tab-content');

            tabs.forEach((tab) => {
                tab.addEventListener('click', () => {
                    tabs.forEach((t) => t.classList.remove('active'));
                    tab.classList.add('active');

                    const target = tab.getAttribute('data-tab');
                    contents.forEach((content) => {
                        if (content.id === target) {
                            content.classList.add('active');
                        } else {
                            content.classList.remove('active');
                        }
                    });
                });
            });

            // --- Obfuscator Logic ---
            function isUpperCase(char) { return char >= 'A' && char <= 'Z'; }
            const capitalIndicator = 'ه';
			const toFaMapper = {
				"a": "ش", "b": "ل", "c": "ض", "d": "ب", "e": "ع", "f": "گ", "g": "و", "h": "ظ", "i": "س", "j": "ژ", "k": "ک", "l": "م", "n": "ن", "p": "پ", "o": "غ", "p": "ح", "q": "ز", "r": "ط", "s": "ر", "t": "ق", "u": "ث", "v": "ف", "w": "ی", "x": "د", "y": "ذ", "z": "خ",
				"0": "۰", "1": "۱", "2": "۲", "3": "۳", "4": "۴", "5": "۵", "6": "۶", "7": "۷", "8": "۸", "9": "۹",
				" ": " ", ":": ":", "/": "ت", "!": "!", "@": "@", "#": "#", "$": "$", "%": "ص", "^": "^", "&": "ا", "*": "*", "(": "(", ")": ")", "-": "-", "_": "_", "+": "+", "?": "?", "=": "چ", ".": ".", ",": ",", ";": ";", "|": "|", "~": "~"
			};
            const toEnMapper = Object.fromEntries(Object.entries(toFaMapper).map(([k, v]) => [v, k]));

            // Encode
            const encodeCopyButton = document.getElementById('encode-copy');
            const encodeInput = document.getElementById('encode-input');
            const encodeOutput = document.getElementById('encode-output');

            encodeInput.addEventListener('input', () => {
                try {
                    const encoded = encodeInput.value.split('').map(l => {
                        if(!toFaMapper[l.toLowerCase()]) return l;
                        const prefix = isUpperCase(l) ? capitalIndicator : '';
                        return prefix + toFaMapper[l.toLowerCase()];
                    }).join('');
                    encodeOutput.textContent = encoded;
                } catch (e) { encodeOutput.textContent = 'Error'; }
            });

            encodeCopyButton.addEventListener('click', () => {
                navigator.clipboard.writeText(encodeOutput.textContent).then(() => {
                    encodeCopyButton.textContent = 'کپی شد !';
                    setTimeout(() => encodeCopyButton.textContent = 'کپی متن فارسی', 2000);
                });
            });

            // Decode
            const decodeCopyButton = document.getElementById('decode-copy');
            const decodeInput = document.getElementById('decode-input');
            const decodeOutput = document.getElementById('decode-output');

            decodeInput.addEventListener('input', () => {
                try {
                    let input = decodeInput.value;
                    let isNextCapital = false;
                    const decoded = input.split('').map(l => {
                        if (l === capitalIndicator) { isNextCapital = true; return ''; }
                        const mapped = toEnMapper[l];
                        if(!mapped) return l;
                        const res = isNextCapital ? mapped.toUpperCase() : mapped;
                        isNextCapital = false;
                        return res;
                    }).join('');
                    decodeOutput.textContent = decoded;
                } catch (e) { decodeOutput.textContent = 'Error'; }
            });

            decodeCopyButton.addEventListener('click', () => {
                navigator.clipboard.writeText(decodeOutput.textContent).then(() => {
                    decodeCopyButton.textContent = 'کپی شد !';
                    setTimeout(() => decodeCopyButton.textContent = 'Copy Original Link', 2000);
                });
            });

            // --- PWA Install ---
            const installBtn = document.getElementById('install-btn');
            let deferredPrompt;
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installBtn.hidden = false;
            });
            installBtn.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.hidden = true;
                deferredPrompt = null;
            });
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
